name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Syntax parse (PowerShell AST)
        shell: pwsh
        run: |
          $files = @('./win.ps1') + @(Get-ChildItem ./lib -Filter '*.ps1' -ErrorAction SilentlyContinue | ForEach-Object FullName)
          foreach ($file in $files) {
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $file), [ref]$null, [ref]$errors) | Out-Null
            if ($errors) { $errors | ForEach-Object { Write-Error (('{0}: {1}' -f $file, $_.Message)) }; exit 1 }
          }
          Write-Host 'OK: no parse errors'

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -MinimumVersion 1.21.0 -Force -Scope CurrentUser
          $paths = @('./win.ps1') + @(Get-ChildItem ./lib -Filter '*.ps1' -ErrorAction SilentlyContinue | ForEach-Object FullName)
          $issues = foreach ($path in $paths) { Invoke-ScriptAnalyzer -Path $path -Settings ./PSScriptAnalyzerSettings.psd1 }
          $issues | Format-Table -AutoSize
          if ($issues | Where-Object Severity -eq 'Error') { exit 1 }

      - name: Pester
        shell: pwsh
        run: |
          Install-Module Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser
          Import-Module Pester -MinimumVersion 5.5.0
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './tests'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg

